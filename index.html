<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Advanced Image Gallery</h1>
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search by caption..." />
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="nature">Nature</option>
                <option value="abstract">Abstract</option>
                <option value="city">City</option>
            </select>
            <button id="slideshowButton">Start Slideshow</button>
            <button id="toggleTheme">Toggle Theme</button>
        </div>
    </header>
    <main id="gallery"></main>
    <div id="fullscreen" class="hidden">
        <img id="fullscreenImg" src="" alt="Fullscreen Image">
        <div id="fullscreenCaption"></div>
        <button id="prevBtn">&#10094;</button>
        <button id="nextBtn">&#10095;</button>
        <button id="closeFullscreen">X</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
