<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Image Gallery with full-screen slideshow, filtering, and download options">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <h1 class="gallery-title">Image Gallery</h1>
    </header>

    <!-- Main Gallery Section -->
    <main class="gallery-container">
        <div class="filter-section">
            <label for="categoryFilter" class="filter-label">Filter by Category:</label>
            <select id="categoryFilter" class="category-filter">
                <option value="all">All</option>
                <option value="abstract">Abstract</option>
                <option value="nature">Nature</option>
                <option value="city">City</option>
            </select>
        </div>

        <div class="images-grid">
            <figure class="image-item" data-category="abstract">
                <img src="images/Abstract-art.jpg" alt="Abstract Art" class="gallery-image lazy">
                <figcaption>Abstract Art</figcaption>
            </figure>
            <figure class="image-item" data-category="nature">
                <img src="images/Forest.jpg" alt="Forest View" class="gallery-image lazy">
                <figcaption>Forest</figcaption>
            </figure>
            <figure class="image-item" data-category="city">
                <img src="images/city-view.jpg" alt="City View" class="gallery-image lazy">
                <figcaption>City View</figcaption>
            </figure>
            <figure class="image-item" data-category="nature">
                <img src="images/sunset.jpg" alt="Sunset" class="gallery-image lazy">
                <figcaption>Sunset</figcaption>
            </figure>
        </div>
    </main>

    <!-- Modal for full-screen image view -->
    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage" alt="Full-screen view of the selected image">
        <div id="modalCaption"></div>
        <a id="downloadBtn" class="download-btn" download>Download</a>
    </div>

    <!-- Footer Section -->
    <footer class="footer">
        <nav>
            <ul class="footer-links">
                <li><a href="privacy-policy.html" target="_blank">Privacy Policy</a></li>
                <li><a href="terms-and-conditions.html" target="_blank">Terms and Conditions</a></li>
                <li><a href="about.html" target="_blank">About</a></li>
            </ul>
        </nav>
        <p>&copy; 2024 Image Gallery. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
