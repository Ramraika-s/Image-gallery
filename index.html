<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Gallery Container -->
    <div class="gallery-container">
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search images..." oninput="filterImages()">
            <select id="category-filter" onchange="filterImages()">
                <option value="all">All</option>
                <option value="abstract">Abstract</option>
                <option value="nature">Nature</option>
                <option value="city">City</option>
                <option value="sunset">Sunset</option>
            </select>
        </div>

        <div class="gallery">
            <div class="image-item" data-category="abstract">
                <figure>
                    <img src="assets/images/abstract-art.jpg" alt="Abstract Art" loading="lazy">
                    <figcaption>Abstract Art</figcaption>
                    <button class="download-btn" onclick="downloadImage('abstract-art.jpg')">Download</button>
                </figure>
            </div>
            <div class="image-item" data-category="nature">
                <figure>
                    <img src="assets/images/forest.jpg" alt="Forest" loading="lazy">
                    <figcaption>Forest</figcaption>
                    <button class="download-btn" onclick="downloadImage('forest.jpg')">Download</button>
                </figure>
            </div>
            <div class="image-item" data-category="city">
                <figure>
                    <img src="assets/images/city-view.jpg" alt="City View" loading="lazy">
                    <figcaption>City View</figcaption>
                    <button class="download-btn" onclick="downloadImage('city-view.jpg')">Download</button>
                </figure>
            </div>
            <div class="image-item" data-category="sunset">
                <figure>
                    <img src="assets/images/sunset.jpg" alt="Sunset" loading="lazy">
                    <figcaption>Sunset</figcaption>
                    <button class="download-btn" onclick="downloadImage('sunset.jpg')">Download</button>
                </figure>
            </div>
        </div>
    </div>

    <!-- Lightbox for Image Viewing -->
    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightbox-image" src="" alt="Lightbox Image">
        <div class="nav-buttons">
            <button onclick="moveSlide(-1)">&#10094;</button>
            <button onclick="moveSlide(1)">&#10095;</button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
