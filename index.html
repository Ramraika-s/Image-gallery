<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Search Bar and Category Filter -->
    <header>
        <input type="text" id="search-bar" placeholder="Search images..." onkeyup="filterImages()">
        <div class="category-filter">
            <button onclick="filterCategory('nature')">Nature</button>
            <button onclick="filterCategory('abstract')">Abstract</button>
            <button onclick="filterCategory('city')">City</button>
            <button onclick="showAll()">Show All</button>
        </div>
    </header>

    <!-- Image Gallery Container -->
    <div class="gallery-container" id="gallery-container">
        <!-- Placeholder images -->
        <figure class="image-item nature">
            <img src="https://picsum.photos/200?random=1" alt="Nature Image 1">
            <figcaption>Nature - Placeholder</figcaption>
            <button class="download-btn">Download</button>
        </figure>
        <figure class="image-item abstract">
            <img src="https://picsum.photos/200?random=2" alt="Abstract Image 1">
            <figcaption>Abstract - Placeholder</figcaption>
            <button class="download-btn">Download</button>
        </figure>
        <figure class="image-item city">
            <img src="https://picsum.photos/200?random=3" alt="City Image 1">
            <figcaption>City - Placeholder</figcaption>
            <button class="download-btn">Download</button>
        </figure>
        <!-- Add more images here -->
    </div>

    <!-- Fullscreen Slideshow Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button class="close-btn" onclick="closeLightbox()">×</button>
            <div class="slideshow-container">
                <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
                <img id="lightbox-img" src="" alt="Full Image">
                <button class="next" onclick="moveSlide(1)">&#10095;</button>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>

</html>
