<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Advanced Image Gallery</h1>
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search images..." oninput="searchImages()">
            <select id="categoryFilter" onchange="filterImages()">
                <option value="all">All</option>
                <option value="nature">Nature</option>
                <option value="city">City</option>
                <option value="abstract">Abstract</option>
            </select>
            <button id="themeToggle" onclick="toggleTheme()">Switch Theme</button>
            <button id="slideshowButton" onclick="startSlideshow()">Start Slideshow</button>
        </div>
    </header>

    <main class="gallery" id="gallery">
        <!-- Images are dynamically loaded -->
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <span class="close" onclick="closeLightbox()">&times;</span>
            <img id="lightboxImage" src="" alt="Fullscreen Image">
            <div class="caption" id="caption"></div>
            <button id="downloadButton" onclick="downloadImage()">Download</button>
            <div class="navigation">
                <span class="prev" onclick="changeImage(-1)">&#10094;</span>
                <span class="next" onclick="changeImage(1)">&#10095;</span>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2024 Shivam's Portfolio | Advanced Image Gallery Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
