<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <!-- Gallery Container -->
    <div class="gallery-container">
        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search images..." onkeyup="filterImages()">
        </div>

        <!-- Category Filter -->
        <div class="category-filter">
            <button onclick="filterCategory('all')">All</button>
            <button onclick="filterCategory('abstract')">Abstract</button>
            <button onclick="filterCategory('nature')">Nature</button>
            <button onclick="filterCategory('city')">City</button>
        </div>

        <!-- Image Gallery -->
        <div class="gallery">
            <div class="image-card" data-category="abstract">
                <figure>
                    <img src="assets/images/abstract-art.jpg" alt="Abstract Art" loading="lazy">
                    <figcaption>Abstract Art</figcaption>
                </figure>
            </div>
            <div class="image-card" data-category="nature">
                <figure>
                    <img src="assets/images/forest.jpg" alt="Forest" loading="lazy">
                    <figcaption>Forest</figcaption>
                </figure>
            </div>
            <div class="image-card" data-category="city">
                <figure>
                    <img src="assets/images/city-view.jpg" alt="City View" loading="lazy">
                    <figcaption>City View</figcaption>
                </figure>
            </div>
            <div class="image-card" data-category="nature">
                <figure>
                    <img src="assets/images/sunset.jpg" alt="Sunset" loading="lazy">
                    <figcaption>Sunset</figcaption>
                </figure>
            </div>
            <!-- Add more images here -->
        </div>

  <!-- Modal for full-screen image view -->
<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modalImage" />
    <div id="modalCaption"></div>
    <a id="downloadBtn" class="download-btn" style="display: none;" download>Download</a>
</div>

        <!-- Slideshow Navigation -->
        <div class="slideshow-controls">
            <button id="prevBtn" onclick="changeImage(-1)">&#10094;</button>
            <button id="nextBtn" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

    <!-- Autoplay Slideshow -->
    <div id="slideshowContainer" class="slideshow-container">
        <div class="slides">
            <img src="assets/images/abstract-art.jpg" alt="Abstract Art" class="slide-image" loading="lazy">
            <img src="assets/images/forest.jpg" alt="Forest" class="slide-image" loading="lazy">
            <img src="assets/images/city-view.jpg" alt="City View" class="slide-image" loading="lazy">
            <img src="assets/images/sunset.jpg" alt="Sunset" class="slide-image" loading="lazy">
        </div>
    </div>
</body>

</html>
