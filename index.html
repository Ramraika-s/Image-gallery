<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Search bar -->
    <div class="search-container">
        <input type="text" id="searchBar" class="search-bar" placeholder="Search images...">
        <select id="categoryFilter" class="category-filter" aria-label="Select a category filter">
            <option value="">All Categories</option>
            <option value="abstract">Abstract</option>
            <option value="nature">Nature</option>
            <option value="urban">Urban</option>
            <option value="sunset">Sunset</option>
        </select>
    </div>

    <!-- Image gallery container -->
    <div class="gallery-container">
        <figure class="image-item" data-category="abstract">
            <img src="images/abstract-art.jpg" alt="Abstract Art" class="gallery-image" />
            <figcaption>Abstract Art</figcaption>
        </figure>
        <figure class="image-item" data-category="nature">
            <img src="images/forest.jpg" alt="Forest" class="gallery-image" />
            <figcaption>Forest</figcaption>
        </figure>
        <figure class="image-item" data-category="urban">
            <img src="images/city-view.jpg" alt="City View" class="gallery-image" />
            <figcaption>City View</figcaption>
        </figure>
        <figure class="image-item" data-category="sunset">
            <img src="images/sunset.jpg" alt="Sunset" class="gallery-image" />
            <figcaption>Sunset</figcaption>
        </figure>
        <!-- Add more images as needed -->
    </div>

    <!-- Modal for full-screen image view -->
    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage" alt="Full-screen view of image" />
        <div id="modalCaption"></div>
        <a id="downloadBtn" class="download-btn hidden" download>Download</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
