<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="scripts.js"></script>
</head>
<body>
    <header>
        <h1>Image Gallery</h1>
    </header>

    <main>
        <section class="search-filter">
            <input type="text" id="searchInput" placeholder="Search images..." aria-label="Search images">
            <select id="categoryFilter" class="category-filter" aria-label="Filter by category">
                <option value="all">All Categories</option>
                <option value="nature">Nature</option>
                <option value="architecture">Architecture</option>
                <option value="people">People</option>
            </select>
        </section>

        <section class="gallery-container">
            <!-- Example image item -->
            <figure class="image-item" data-category="nature">
                <img class="gallery-image lazy" data-src="path-to-image.jpg" alt="Description of image">
                <figcaption>Image Caption</figcaption>
            </figure>
            <!-- Add more images as required -->
        </section>
    </main>

    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage" alt="Full view">
        <div id="modalCaption"></div>
        <a id="downloadBtn" class="download-btn" download>Download</a>
    </div>

    <footer>
        <div class="footer-links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms.html">Terms & Conditions</a>
            <a href="about.html">About</a>
        </div>
        <p>&copy; 2024 Image Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
