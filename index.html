<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A professional and premium image gallery with search, filters, and full-screen viewing.">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1 class="gallery-title">Image Gallery</h1>
    </header>

    <!-- Main Gallery Section -->
    <main class="gallery-container">
        <div class="filter-section">
            <label for="searchInput" class="filter-label">Search Images:</label>
            <input
                type="text"
                id="searchInput"
                class="search-bar"
                placeholder="Type to search images"
                aria-label="Search for images"
            >

            <label for="categoryFilter" class="filter-label">Filter by Category:</label>
            <select id="categoryFilter" class="category-filter" aria-label="Filter images by category">
                <option value="all">All</option>
                <option value="abstract">Abstract</option>
                <option value="nature">Nature</option>
                <option value="city">City</option>
            </select>
        </div>

        <div class="images-grid">
            <figure class="image-item" data-category="abstract">
                <img
                    src="images/placeholder.jpg"
                    data-src="images/abstract-art.jpg"
                    alt="Abstract Art"
                    class="gallery-image lazy"
                >
                <figcaption>Abstract Art</figcaption>
            </figure>
            <figure class="image-item" data-category="nature">
                <img
                    src="images/placeholder.jpg"
                    data-src="images/forest.jpg"
                    alt="Forest View"
                    class="gallery-image lazy"
                >
                <figcaption>Forest</figcaption>
            </figure>
            <figure class="image-item" data-category="city">
                <img
                    src="images/placeholder.jpg"
                    data-src="images/city-view.jpg"
                    alt="City View"
                    class="gallery-image lazy"
                >
                <figcaption>City View</figcaption>
            </figure>
            <figure class="image-item" data-category="nature">
                <img
                    src="images/placeholder.jpg"
                    data-src="images/sunset.jpg"
                    alt="Sunset"
                    class="gallery-image lazy"
                >
                <figcaption>Sunset</figcaption>
            </figure>
        </div>
    </main>

    <!-- Modal for full-screen image view -->
    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage" alt="Full View">
        <div id="modalCaption"></div>
        <a id="downloadBtn" class="download-btn" style="display: none;" download>Download</a>
    </div>

    <!-- Footer Section -->
    <footer class="footer">
        <ul class="footer-links">
            <li><a href="privacy.html">Privacy Policy</a></li>
            <li><a href="terms.html">Terms and Conditions</a></li>
            <li><a href="about.html">About Us</a></li>
        </ul>
        <p>&copy; 2024 Image Gallery. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
